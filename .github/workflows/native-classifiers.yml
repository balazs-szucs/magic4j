name: Build Native Classifiers

on:
  workflow_dispatch:
    inputs:
      commit_to_branch:
        description: "If true, commit built native binaries into src/main/resources on the current branch"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  workflow_call:

permissions:
  contents: read

jobs:
  build-native:
    name: ${{ matrix.classifier }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - classifier: linux-x64
            runner: ubuntu-latest
            lib_name: libmagic.so
            upload_db: true

          - classifier: linux-arm64
            runner: ubuntu-24.04-arm
            lib_name: libmagic.so
            upload_db: false

          - classifier: linux-musl-x64
            runner: ubuntu-latest
            lib_name: libmagic.so
            musl_docker: true
            upload_db: false

          - classifier: linux-musl-arm64
            runner: ubuntu-24.04-arm
            lib_name: libmagic.so
            musl_docker: true
            upload_db: false

          - classifier: darwin-x64
            runner: macos-15-intel
            lib_name: libmagic.dylib
            upload_db: false

          - classifier: darwin-arm64
            runner: macos-14
            lib_name: libmagic.dylib
            upload_db: false

          - classifier: windows-x64
            runner: windows-latest
            lib_name: magic1.dll
            upload_db: false

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install libmagic (Debian/Ubuntu)
        if: runner.os == 'Linux' && !matrix.musl_docker
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libmagic-dev file
          LIB=$(find /usr/lib -name "libmagic.so.1" -type f -o -name "libmagic.so.1" | head -1)
          echo "Found library: $LIB"
          mkdir -p "src/main/resources/natives/${{ matrix.classifier }}"
          cp "$LIB" "src/main/resources/natives/${{ matrix.classifier }}/${{ matrix.lib_name }}"

      - name: Extract magic.mgc (linux-x64 only)
        if: matrix.upload_db
        run: |
          DB=$(find /usr/share/misc -name "magic.mgc" | head -1)
          echo "Found magic database: $DB ($(du -h "$DB" | cut -f1))"
          cp "$DB" src/main/resources/magic.mgc

      - name: Install libmagic (Alpine/musl via Docker)
        if: matrix.musl_docker
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            alpine:3.21 sh -c '
              apk add --no-cache libmagic file &&
              mkdir -p "src/main/resources/natives/${{ matrix.classifier }}" &&
              LIB=$(find /usr/lib -name "libmagic.so.1" | head -1) &&
              echo "Found library: $LIB" &&
              cp "$LIB" "src/main/resources/natives/${{ matrix.classifier }}/${{ matrix.lib_name }}"
            '

      - name: Install libmagic (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install libmagic file
          LIB="$(brew --prefix libmagic)/lib/libmagic.dylib"
          echo "Found library: $LIB"
          mkdir -p "src/main/resources/natives/${{ matrix.classifier }}"
          cp "$LIB" "src/main/resources/natives/${{ matrix.classifier }}/${{ matrix.lib_name }}"

      - name: Install libmagic (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          C:\msys64\usr\bin\bash.exe -lc "pacman -S --noconfirm mingw-w64-x86_64-file"
          $dll = Get-ChildItem -Path "C:\msys64\mingw64\bin" -Filter "magic1.dll" | Select-Object -First 1
          Write-Host "Found library: $($dll.FullName)"
          New-Item -ItemType Directory -Force -Path "src\main\resources\natives\windows-x64"
          Copy-Item $dll.FullName "src\main\resources\natives\windows-x64\${{ matrix.lib_name }}"

      - name: Verify library exists
        shell: bash
        run: |
          lib="src/main/resources/natives/${{ matrix.classifier }}/${{ matrix.lib_name }}"
          test -f "$lib" || { echo "ERROR: $lib not found"; exit 1; }
          echo "Verified: $lib ($(du -h "$lib" | cut -f1))"

      - name: Upload classifier artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.classifier }}
          path: src/main/resources/natives/${{ matrix.classifier }}/${{ matrix.lib_name }}

      - name: Upload staged resource artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: staged-${{ matrix.classifier }}
          path: src/main/resources/natives/${{ matrix.classifier }}/${{ matrix.lib_name }}

      - name: Upload magic database
        if: matrix.upload_db
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: magic-db
          path: src/main/resources/magic.mgc

  verify-all-classifiers:
    name: Verify all classifier folders
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"

      - uses: gradle/actions/setup-gradle@6f229686ee4375cc4a86b2514c89bac4930e82c4 # v5.0.0

      - name: Download staged artifacts
        if: ${{ inputs.commit_to_branch == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: staged-*
          path: /tmp/staged-native

      - name: Download magic database
        if: ${{ inputs.commit_to_branch == 'true' }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: magic-db
          path: /tmp/magic-db

      - name: Place staged binaries in resources
        if: ${{ inputs.commit_to_branch == 'true' }}
        shell: bash
        run: |
          mkdir -p src/main/resources/natives/linux-x64
          mkdir -p src/main/resources/natives/linux-arm64
          mkdir -p src/main/resources/natives/linux-musl-x64
          mkdir -p src/main/resources/natives/linux-musl-arm64
          mkdir -p src/main/resources/natives/darwin-x64
          mkdir -p src/main/resources/natives/darwin-arm64
          mkdir -p src/main/resources/natives/windows-x64
          cp /tmp/staged-native/staged-linux-x64/libmagic.so      src/main/resources/natives/linux-x64/libmagic.so
          cp /tmp/staged-native/staged-linux-arm64/libmagic.so     src/main/resources/natives/linux-arm64/libmagic.so
          cp /tmp/staged-native/staged-linux-musl-x64/libmagic.so  src/main/resources/natives/linux-musl-x64/libmagic.so
          cp /tmp/staged-native/staged-linux-musl-arm64/libmagic.so src/main/resources/natives/linux-musl-arm64/libmagic.so
          cp /tmp/staged-native/staged-darwin-x64/libmagic.dylib   src/main/resources/natives/darwin-x64/libmagic.dylib
          cp /tmp/staged-native/staged-darwin-arm64/libmagic.dylib  src/main/resources/natives/darwin-arm64/libmagic.dylib
          cp /tmp/staged-native/staged-windows-x64/magic1.dll      src/main/resources/natives/windows-x64/magic1.dll
          cp /tmp/magic-db/magic.mgc                               src/main/resources/magic.mgc

      - run: ./gradlew verifyNativeClassifiers

  commit-staged-binaries:
    name: Commit staged binaries
    runs-on: ubuntu-latest
    needs: verify-all-classifiers
    if: ${{ inputs.commit_to_branch == 'true' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download staged artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: staged-*
          path: /tmp/staged-native

      - name: Download magic database
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: magic-db
          path: /tmp/magic-db

      - name: Place staged binaries in resources
        shell: bash
        run: |
          mkdir -p src/main/resources/natives/linux-x64
          mkdir -p src/main/resources/natives/linux-arm64
          mkdir -p src/main/resources/natives/linux-musl-x64
          mkdir -p src/main/resources/natives/linux-musl-arm64
          mkdir -p src/main/resources/natives/darwin-x64
          mkdir -p src/main/resources/natives/darwin-arm64
          mkdir -p src/main/resources/natives/windows-x64
          cp /tmp/staged-native/staged-linux-x64/libmagic.so      src/main/resources/natives/linux-x64/libmagic.so
          cp /tmp/staged-native/staged-linux-arm64/libmagic.so     src/main/resources/natives/linux-arm64/libmagic.so
          cp /tmp/staged-native/staged-linux-musl-x64/libmagic.so  src/main/resources/natives/linux-musl-x64/libmagic.so
          cp /tmp/staged-native/staged-linux-musl-arm64/libmagic.so src/main/resources/natives/linux-musl-arm64/libmagic.so
          cp /tmp/staged-native/staged-darwin-x64/libmagic.dylib   src/main/resources/natives/darwin-x64/libmagic.dylib
          cp /tmp/staged-native/staged-darwin-arm64/libmagic.dylib  src/main/resources/natives/darwin-arm64/libmagic.dylib
          cp /tmp/staged-native/staged-windows-x64/magic1.dll      src/main/resources/natives/windows-x64/magic1.dll
          cp /tmp/magic-db/magic.mgc                               src/main/resources/magic.mgc

      - name: Commit and push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/main/resources
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "ci(native): stage classifier binaries"
          git push
